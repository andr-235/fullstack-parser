<mat-toolbar color="primary">
  @if (isHandset()) {
  <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()">
    <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
  </button>
  }
  <span>{{ title() }}</span>
  <span class="spacer"></span>
  <button mat-icon-button>
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="isHandset() ? 'dialog' : 'navigation'"
    [mode]="isHandset() ? 'over' : 'side'" [opened]="!isHandset()">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/groups" routerLinkActive="active">
        <mat-icon>group</mat-icon>
        <span>Groups</span>
      </a>
      <a mat-list-item routerLink="/keywords" routerLinkActive="active">
        <mat-icon>key</mat-icon>
        <span>Keywords</span>
      </a>
      <a mat-list-item routerLink="/comments" routerLinkActive="active">
        <mat-icon>comment</mat-icon>
        <span>Comments</span>
      </a>
      <a mat-list-item routerLink="/parser" routerLinkActive="active">
        <mat-icon>settings</mat-icon>
        <span>Parser</span>
      </a>
      <a mat-list-item routerLink="/monitoring" routerLinkActive="active">
        <mat-icon>monitoring</mat-icon>
        <span>Monitoring</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive="active">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
