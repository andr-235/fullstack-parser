<div class="register-container">
 <div class="register-card">
  <mat-card>
   <mat-card-header>
    <mat-card-title>Регистрация</mat-card-title>
    <mat-card-subtitle>Создайте новый аккаунт</mat-card-subtitle>
   </mat-card-header>

   <mat-card-content>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
     <mat-form-field appearance="outline" class="full-width">
      <mat-label>Имя пользователя</mat-label>
      <input matInput formControlName="username" placeholder="Введите имя пользователя" [errorStateMatcher]="matcher"
       autocomplete="username">
      <mat-icon matSuffix>person</mat-icon>
      <mat-error *ngIf="isFieldInvalid('username')">
       {{ getErrorMessage('username') }}
      </mat-error>
     </mat-form-field>

     <mat-form-field appearance="outline" class="full-width">
      <mat-label>Пароль</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
       placeholder="Введите пароль" [errorStateMatcher]="matcher" autocomplete="new-password">
      <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" [attr.aria-label]="'Hide password'"
       [attr.aria-pressed]="hidePassword">
       <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="isFieldInvalid('password')">
       {{ getErrorMessage('password') }}
      </mat-error>
     </mat-form-field>

     <mat-form-field appearance="outline" class="full-width">
      <mat-label>Подтвердите пароль</mat-label>
      <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword"
       placeholder="Повторите пароль" [errorStateMatcher]="matcher" autocomplete="new-password">
      <button mat-icon-button matSuffix (click)="hideConfirmPassword = !hideConfirmPassword"
       [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hideConfirmPassword">
       <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="isFieldInvalid('confirmPassword') || isPasswordMismatch()">
       {{ getErrorMessage('confirmPassword') }}
      </mat-error>
     </mat-form-field>

     <div class="form-actions">
      <mat-checkbox formControlName="agreeToTerms" color="primary">
       Я согласен с <a href="/terms" target="_blank">условиями использования</a>
      </mat-checkbox>
     </div>

     <button mat-raised-button color="primary" type="submit" class="register-button"
      [disabled]="registerForm.invalid || isLoading">
      <mat-icon *ngIf="!isLoading">person_add</mat-icon>
      <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
      {{ isLoading ? 'Регистрация...' : 'Зарегистрироваться' }}
     </button>
    </form>

    <mat-divider class="divider"></mat-divider>

    <div class="additional-actions">
     <span>Уже есть аккаунт?</span>
     <a mat-button color="primary" routerLink="/login">
      Войти в систему
     </a>
    </div>
   </mat-card-content>
  </mat-card>
 </div>
</div>
